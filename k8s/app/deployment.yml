apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: gestion-projet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: auth-service
          image: nour292/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081

          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secret

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 20
