apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: gestion-projet
data:
  SERVER_PORT: "8081"

  # ✅ ACTUATOR OUVERT SUR LE MÊME PORT
  MANAGEMENT_SECURITY_ENABLED: "false"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"

  SPRING_APPLICATION_NAME: "auth-service"

  # ✅ JDBC CORRECT (PAS DE HTML)
  SPRING_DATASOURCE_URL: "jdbc:postgresql://ep-wandering-rice-a4uh9a3k.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"

  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_SHOW_SQL: "true"

  HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  HIBERNATE_FORMAT_SQL: "true"

  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "DEBUG"
