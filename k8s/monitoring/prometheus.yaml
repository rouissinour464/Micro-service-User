apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093

    rule_files:
      - /etc/prometheus/alerts/*.yml

    scrape_configs:
      - job_name: "auth-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - auth-service.gestion-projet.svc.cluster.local:8081
            labels:
              application: "auth-service"

      - job_name: "stage-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - stage-service.gestion-projet.svc.cluster.local:8082
            labels:
              application: "stage-service"

      - job_name: "gateway-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - gateway-service.gestion-projet.svc.cluster.local:8080
            labels:
              application: "gateway-service"

      - job_name: "frontend"
        metrics_path: /stub_status
        static_configs:
          - targets:
              - frontend-auth.gestion-projet.svc.cluster.local:80
            labels:
              application: "frontend"

      - job_name: "node-exporter"
        static_configs:
          - targets:
              - node-exporter.monitoring.svc.cluster.local:9100

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: alert-rules
              mountPath: /etc/prometheus/alerts
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: alert-rules
          configMap:
            name: prometheus-alerts

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090