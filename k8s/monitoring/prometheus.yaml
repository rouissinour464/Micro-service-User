# ============================================================
# CONFIGMAP PROMETHEUS (AVEC LABEL application POUR GRAFANA)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093

    rule_files:
      - /etc/prometheus/alerts/*.yml

    scrape_configs:
      # ================= AUTH SERVICE =================
      - job_name: "auth-service"
        metrics_path: /actuator/prometheus

        static_configs:
          - targets:
              - auth-service.gestion-projet.svc.cluster.local:8081
            labels:
              application: "auth-service"

        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: auth-service.gestion-projet.svc.cluster.local:8081

      # ================= NODE EXPORTER =================
      - job_name: "node-exporter"
        static_configs:
          - targets:
              - node-exporter.monitoring.svc.cluster.local:9100

---
# ============================================================
# DEPLOYMENT PROMETHEUS
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: alert-rules
              mountPath: /etc/prometheus/alerts
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: alert-rules
          configMap:
            name: prometheus-alerts

---
# ============================================================
# SERVICE PROMETHEUS
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
